# Working Nginx Configuration for Sakai Subdomain Proxy
#
# This config proxies requests from a subdomain (e.g., main.aflon.com.ng)
# to a locally running Sakai instance on port 8080.
#
# Prerequisites:
#   1. Add the subdomain to /etc/hosts: 127.0.0.1 main.aflon.com.ng
#   2. Copy this file to /etc/nginx/sites-available/<subdomain>
#   3. Symlink to sites-enabled: sudo ln -sf /etc/nginx/sites-available/<subdomain> /etc/nginx/sites-enabled/
#   4. Reload nginx: sudo nginx -s reload
#
# Key headers explained:
#   - Host: passes the original hostname to Sakai
#   - X-Forwarded-Host: tells Sakai which subdomain the user visited
#   - X-Forwarded-Proto: tells Sakai if the request was HTTP or HTTPS
#   - X-Sakai-Tenant: custom header to identify the tenant (for multi-tenant logic)
#
# sakai.properties must include: serverNameHeader=X-Forwarded-Host
#

server {
    listen 80;
    server_name main.aflon.com.ng;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # Pass original host/protocol info to Sakai
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Tenant identification
        proxy_set_header X-Sakai-Tenant main;

        # WebSocket support (for chat, etc.)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (Sakai can be slow to respond)
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        # Larger file uploads
        client_max_body_size 512M;
    }
}
